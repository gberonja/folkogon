<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekti — Folkogon</title>
<meta name="description" content="Pregled projekata Folkogon platforme — mobilne aplikacije, web alati i digitalna dokumentacija folklorne baštine.">
<meta property="og:title" content="Projekti — Folkogon">
<meta property="og:description" content="Pregled projekata Folkogon platforme — mobilne aplikacije, web alati i digitalna dokumentacija folklorne baštine.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#F5F0E8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
<script src="data/sadrzaj.js"></script>
<style>
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .project-card {
    background: var(--cream);
    padding: 2.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    min-height: 240px;
    transition: background 0.2s;
  }

  .project-card:hover { background: #EDE8DE; }

  .project-card.uskoro { opacity: 0.6; }

  .project-type {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 500;
  }

  .project-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.15;
  }

  .project-desc {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.65;
    flex: 1;
  }

  .project-links {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .uskoro-badge {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.35rem 0.8rem;
    width: fit-content;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Folk<span>o</span>gon</a>
  <ul class="nav-links">
    <li><a href="projekti.html" class="active">Projekti</a></li>
    <li><a href="note.html">Note</a></li>
    <li><a href="linkovi.html">Linkovi</a></li>
    <li><a href="tim.html">Tim</a></li>
  </ul>
  <button class="nav-hamburger" id="nav-toggle" aria-label="Otvori izbornik"><span></span><span></span><span></span></button>
</nav>

<main class="page">
  <div class="page-header">
    <span class="page-num">01</span>
    <h1 class="page-title">Projekti</h1>
  </div>
  <div class="content">
    <div class="projects-grid" id="projects-grid"></div>
  </div>
</main>

<footer>
  <p>© 2026 Folkogon.</p>
  <p><a href="index.html" style="color:var(--muted); text-decoration:none;">← Početna</a></p>
</footer>

<script>
  const grid = document.getElementById('projects-grid');

  PROJEKTI.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = `project-card fade-up ${p.status === 'uskoro' ? 'uskoro' : ''}`;

    const linkovi = p.status === 'uskoro'
      ? `<span class="uskoro-badge">Uskoro dostupno</span>`
      : p.linkovi.map(l =>
          `<a href="${l.url}" class="btn ${l.stil}" ${l.url.startsWith('http') ? 'target="_blank"' : ''}>${l.label}</a>`
        ).join('');

    card.innerHTML = `
      <span class="project-type">${p.tip}</span>
      <h2 class="project-name">${p.naziv}</h2>
      <p class="project-desc">${p.opis}</p>
      <div class="project-links">${linkovi}</div>
    `;
    grid.appendChild(card);
  });
</script>

<script src="js/nav.js"></script>
</body>
</html>
